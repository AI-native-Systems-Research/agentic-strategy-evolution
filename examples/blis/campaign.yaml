research_question: >
  Does increasing the prefix ratio in a workload reduce TTFT under moderate load?

target_system:
  name: "BLIS — LLM Inference Serving Simulator"
  description: >
    BLIS is a discrete-event simulator for LLM inference serving.
    It models request arrivals, scheduling, and KV-cache management.
  observable_metrics:
    - ttft_mean_ms
    - ttft_p99_ms
    - e2e_mean_ms
    - responses_per_sec
  controllable_knobs:
    - prefix_tokens
    - rate
    - num_instances
    - scheduler
  execution:
    repo_path: /Users/toslali/Desktop/work/ibm/projects/llm-inference/study/inference-llmd/ai-native-method/run-single-iteration/blis
    setup_commands:
      - "go build -o blis ."
    run_command: >-
      ./blis run
      --model qwen/qwen3-14b
      --num-instances 4
      --rate 100
      --num-requests 500
      --seed 42
      --metrics-path {metrics_path}
    metrics_output_format: json
    cleanup_commands: []
    timeout: 300

review:
  design_perspectives:
    - statistical-rigor
    - causal-sufficiency
    - confound-risk
  findings_perspectives:
    - statistical-rigor
    - causal-sufficiency
    - confound-risk
    - measurement-validity
  max_review_rounds: 3

prompts:
  methodology_layer: "prompts/methodology"
  domain_adapter_layer: null
